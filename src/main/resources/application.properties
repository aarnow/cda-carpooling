spring.application.name=carpooling

# ========== PROFIL ACTIF ==========
spring.profiles.active=dev

# ========== DATABASE ==========
spring.datasource.url=jdbc:postgresql://postgres:5432/carpooling
spring.datasource.username=myuser
spring.datasource.password=mypassword
spring.datasource.driver-class-name=org.postgresql.Driver

# ========== JPA/HIBERNATE ==========
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ========== SERVER ==========
server.port=8080

# ========== LOGGING ==========
logging.level.root=INFO
logging.level.com.cda.carpooling=DEBUG

logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.hibernate.orm=WARN

logging.level.org.springframework=WARN
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.boot=INFO

logging.level.com.zaxxer.hikari=WARN

logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n