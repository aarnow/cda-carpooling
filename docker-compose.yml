services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: carpooling
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d carpooling"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carpooling-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRESQL_ADDON_HOST: bggzcwrpaqzm5cedig8h-postgresql.services.clever-cloud.com
      POSTGRESQL_ADDON_PORT: "7386"
      POSTGRESQL_ADDON_DB: bggzcwrpaqzm5cedig8h
      POSTGRESQL_ADDON_USER: uxthnrpby8hqtytmzqc9
      POSTGRESQL_ADDON_PASSWORD: yzisdgzV5heCordZSws0
      JWT_SECRET_KEY: JpBPxK9lkIQtmNsZ0WC4SN/4CVZlsGueZR80nqKL+NeZ+xAmrhOtlxw9iQs7p0qd
      FRONTEND_URL: http://localhost:5173
    networks:
      - app-network
    restart: on-failure

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: zap
    depends_on:
      - app
    networks:
      - app-network
    volumes:
      - ./zap-reports:/zap/wrk
    command: >
      zap-api-scan.py
      -t http://app:8080/v3/api-docs
      -f openapi
      -r zap-report.html
      -J zap-report.json
      -l WARN

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonar-data:/opt/sonarqube/data
      - sonar-logs:/opt/sonarqube/logs
    networks:
      - app-network

volumes:
  postgres-data:
  sonar-data:
  sonar-logs:

networks:
  app-network: