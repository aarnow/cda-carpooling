name: CI - Tests

# Déclenchement : push ou merge sur main
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    # 🐘 Service PostgreSQL
    services:
      docker:
        image: docker:dind
        options: --privileged

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installer Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Configurer Docker CLI (pour Testcontainers)
      - name: Set up Docker CLI
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Lancer les tests
      - name: Run tests
        run: mvn clean test -Dspring.profiles.active=test
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

      # 4. Publier le rapport JaCoCo
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/